<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>MedCityAI Dashboard</title>
	<link rel="icon" type="image/png" href="images/medcityai_simple1.png?v=1" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<style>
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}

		body {
			font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			background: #5f7894;
			color: #1f2d3d;
			font-size: 20px;
			position: relative;
		}

		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background: linear-gradient(120deg, rgba(92, 118, 148, 0.58) 0%, rgba(73, 99, 129, 0.62) 100%),
				url('images/banner3.jpg') center center / cover no-repeat;
			opacity: 0.68;
			z-index: 0;
			pointer-events: none;
		}

		.dashboard-shell {
			height: 100vh;
			display: grid;
			grid-template-rows: auto minmax(0, 1fr);
			gap: 0.25rem;
			padding: 0.6rem 1.1rem 0;
			box-sizing: border-box;
			font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			position: relative;
			z-index: 1;
		}

		.weather-strip {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
			padding: 0.35rem 0.65rem;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.7);
			border: 1px solid rgba(187, 205, 225, 0.62);
			box-shadow: 0 6px 18px rgba(25, 42, 61, 0.12);
			backdrop-filter: blur(4px);
		}

		.weather-meta {
			font-size: 1.32rem;
			font-weight: 600;
			color: #35506a;
			white-space: nowrap;
			margin-left: auto;
			text-align: right;
		}

		.dashboard-shell,
		.dashboard-shell * {
			font-family: inherit;
		}

		.dashboard-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 0.8rem;
			padding: 0.35rem 0.65rem;
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.72);
			border: 1px solid rgba(188, 205, 224, 0.65);
			box-shadow: 0 8px 24px rgba(25, 42, 61, 0.14);
			backdrop-filter: blur(6px);
		}

		.dashboard-logo {
			height: clamp(52px, 7vh, 84px);
			width: auto;
			object-fit: contain;
		}

		.dashboard-tagline {
			margin: 0;
			font-size: 1.58rem;
			font-weight: 400;
			line-height: 1.2;
			color: #5c6878;
			text-align: right;
			display: flex;
			align-items: center;
			justify-content: flex-end;
			height: 100%;
			transform: translateY(4px);
		}

		.dashboard-tagline .tagline-location {
			font-weight: 700;
			margin-left: 0.3em;
		}

		.article-grid {
			position: relative;
			overflow: hidden;
			min-height: 0;
			height: 100%;
			width: 100%;
			margin: 0;
			margin-top: 1rem;
			align-self: stretch;
			padding: 0.15rem 0.05rem;
			box-sizing: border-box;
		}

		.carousel-track {
			display: flex;
			height: 100%;
			width: 100%;
			transform: translateX(0%);
		}

		.carousel-slide {
			flex: 0 0 100%;
			height: 100%;
			min-width: 0;
			display: block;
		}

		.carousel-slide-grid {
			display: grid;
			grid-template-columns: repeat(var(--cards-per-view, 3), minmax(0, 1fr));
			grid-template-rows: minmax(0, 1fr);
			gap: 1.3rem;
			height: 100%;
			align-items: start;
		}

		.article-stack {
			display: grid;
			grid-template-rows: auto minmax(0, 1fr);
			min-height: 0;
			height: auto;
			gap: 0;
		}

		.article-tile {
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(247, 251, 255, 0.94) 100%);
			border: 1px solid #ccdaea;
			border-radius: 16px 16px 0 0;
			padding: 1.15rem 0.9rem 0.8rem;
			display: grid;
			grid-template-rows: auto auto auto 1fr;
			gap: 0.45rem;
			box-shadow: 0 10px 24px rgba(19, 38, 59, 0.18);
			min-height: 0;
			overflow: hidden;
			position: relative;
			height: auto;
			box-sizing: border-box;
		}

		.tile-date {
			position: absolute;
			top: 0;
			left: 0;
			background: linear-gradient(135deg, #ef6a5c 0%, #d94739 100%);
			color: #fff;
			font-size: 1.12rem;
			font-weight: 400;
			padding: 0.6rem 0.9rem;
			border-radius: 16px 0 14px 0;
			text-transform: uppercase;
			letter-spacing: 0.03em;
			line-height: 1.2;
			pointer-events: none;
		}

		.specialty-badges {
			position: absolute;
			top: 0.35rem;
			right: 0.45rem;
			display: flex;
			flex-direction: row;
			align-items: center;
			gap: 0.5rem;
			pointer-events: none;
			white-space: nowrap;
		}

		.department-badge {
			background: transparent;
			color: #355372;
			font-size: 0.96rem;
			font-weight: 500;
			font-style: italic;
			line-height: 1.2;
			padding: 0;
			border: none;
			border-radius: 0;
		}

		.tile-title {
			margin: 1.7rem 0 0;
			font-size: 1.7rem;
			font-weight: 500;
			line-height: 1.28;
			color: #0056a3;
			text-transform: none;
			letter-spacing: normal;
			overflow: visible;
			display: block;
			line-clamp: unset;
			-webkit-line-clamp: unset;
			-webkit-box-orient: initial;
		}

		.tile-authors,
		.tile-journal {
			margin: 0;
			font-size: 1.08rem;
			line-height: 1.35;
			overflow: hidden;
			white-space: normal;
			text-overflow: clip;
		}

		.tile-authors {
			border-top: 1px dashed #c6d4e4;
			padding-top: 0.55rem;
			margin-top: 0.2rem;
			color: #2f3f52;
		}

		.tile-authors .roch-author {
			text-decoration: underline;
			text-decoration-thickness: 1px;
			text-underline-offset: 2px;
			text-decoration-color: #687b90;
		}

		.tile-journal {
			font-style: italic;
			color: #4f647d;
		}

		.ai-summary-panel {
			border: 1px solid #bfd2eb;
			border-top: none;
			border-radius: 0 0 16px 16px;
			background: linear-gradient(180deg, #edf5ff 0%, #e3efff 100%);
			padding: 0.7rem 0.9rem 0.8rem;
			min-height: 0;
			display: grid;
			grid-template-rows: auto 1fr;
			gap: 0.45rem;
			height: auto;
			box-sizing: border-box;
			box-shadow: 0 10px 20px rgba(23, 47, 72, 0.14);
		}

		.ai-summary-label {
			font-size: 0.98rem;
			font-weight: 700;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: #1f4e85;
		}

		.ai-summary-text {
			margin: 0;
			font-size: 1.12rem;
			line-height: 1.35;
			color: #2b4057;
			overflow: hidden;
			display: block;
		}

		.tile-spacer {
			min-height: 0;
		}

		.status-message {
			grid-column: 1 / -1;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.28rem;
			font-weight: 600;
			color: #4f647d;
			background: #fff;
			border: 1px solid #dce6f2;
			border-radius: 10px;
		}

		.carousel-indicators {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 0.5rem;
			min-height: 26px;
			position: fixed;
			left: 0;
			right: 0;
			bottom: 8px;
			z-index: 20;
			pointer-events: none;
		}

		.carousel-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #d4e2f1;
			opacity: 0.85;
			transition: transform 0.25s ease, background-color 0.25s ease, opacity 0.25s ease;
		}

		.carousel-dot.active {
			background: #0a5ea8;
			opacity: 1;
			transform: scale(1.22);
			box-shadow: 0 0 0 4px rgba(10, 94, 168, 0.16);
		}
	</style>
</head>
<body>
	<main class="dashboard-shell" aria-label="MedCityAI Dashboard">
		<div class="weather-strip" aria-live="polite" aria-label="Rochester weather and local time">
			<img class="dashboard-logo" src="images/medcityai_logo1.png" alt="MedCityAI" />
			<div id="weatherMeta" class="weather-meta">--°F &middot; -- &middot; --</div>
		</div>

		<section id="articleGrid" class="article-grid" aria-label="Three most recent articles">
			<div class="status-message">Loading latest articles...</div>
		</section>
		<div id="carouselIndicators" class="carousel-indicators" aria-label="Article carousel position"></div>
	</main>

	<script>
		const SET_SIZE = 3;
		const MAX_SETS = 4;
		const ROTATE_INTERVAL_MS = 14000;
		const SLIDE_DURATION_MS = 1300;
		const WEATHER_REFRESH_MS = 15 * 60 * 1000;
		const ROCHESTER_TIMEZONE = 'America/Chicago';
		const WEATHER_API_URL = 'https://api.open-meteo.com/v1/forecast?latitude=44.0121&longitude=-92.4802&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,is_day&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FChicago';
		let carouselTimer = null;
		let summaryResizeTimer = null;
		let layoutResizeTimer = null;
		let weatherTimer = null;
		let clockTimer = null;
		let allDashboardArticles = [];
		let currentCardsPerView = 3;

		function getCardsPerView() {
			const width = window.innerWidth || document.documentElement.clientWidth || 0;
			if (width >= 2400) return 6;
			if (width >= 1900) return 5;
			if (width >= 1500) return 4;
			if (width >= 1100) return 3;
			return 2;
		}
		let latestTemperatureText = '--°F';

		function updateWeatherMeta() {
			const weatherMetaEl = document.getElementById('weatherMeta');
			if (!weatherMetaEl) return;

			const now = new Date();
			const dateText = new Intl.DateTimeFormat('en-US', {
				timeZone: ROCHESTER_TIMEZONE,
				weekday: 'short',
				month: 'short',
				day: 'numeric'
			}).format(now);

			const timeText = new Intl.DateTimeFormat('en-US', {
				timeZone: ROCHESTER_TIMEZONE,
				hour: 'numeric',
				minute: '2-digit'
			}).format(now);

			weatherMetaEl.textContent = `${latestTemperatureText} · ${dateText} · ${timeText}`;
		}

		async function refreshWeatherStrip() {
			const weatherMetaEl = document.getElementById('weatherMeta');
			if (!weatherMetaEl) return;

			try {
				const response = await fetch(WEATHER_API_URL, { cache: 'no-store' });
				if (!response.ok) {
					throw new Error('Weather unavailable');
				}

				const data = await response.json();
				const current = data && data.current ? data.current : null;
				if (!current) {
					throw new Error('Weather data missing');
				}

				latestTemperatureText = Number.isFinite(current.temperature_2m)
					? `${Math.round(current.temperature_2m)}°F`
					: '--°F';
				updateWeatherMeta();
			} catch (error) {
				latestTemperatureText = '--°F';
				updateWeatherMeta();
			}
		}

		function initWeatherStrip() {
			if (weatherTimer) {
				clearInterval(weatherTimer);
			}
			if (clockTimer) {
				clearInterval(clockTimer);
			}

			updateWeatherMeta();
			refreshWeatherStrip();

			clockTimer = setInterval(updateWeatherMeta, 1000);
			weatherTimer = setInterval(refreshWeatherStrip, WEATHER_REFRESH_MS);
		}

		function parseCsvRows(csvText) {
			const rows = [];
			let currentRow = [];
			let currentValue = '';
			let inQuotes = false;

			for (let i = 0; i < csvText.length; i++) {
				const char = csvText[i];
				const next = csvText[i + 1];

				if (char === '"') {
					if (inQuotes && next === '"') {
						currentValue += '"';
						i++;
					} else {
						inQuotes = !inQuotes;
					}
					continue;
				}

				if (char === ',' && !inQuotes) {
					currentRow.push(currentValue.trim());
					currentValue = '';
					continue;
				}

				if ((char === '\n' || char === '\r') && !inQuotes) {
					if (char === '\r' && next === '\n') {
						i++;
					}
					currentRow.push(currentValue.trim());
					currentValue = '';
					if (currentRow.some(cell => cell !== '')) {
						rows.push(currentRow);
					}
					currentRow = [];
					continue;
				}

				currentValue += char;
			}

			if (currentValue.length || currentRow.length) {
				currentRow.push(currentValue.trim());
				if (currentRow.some(cell => cell !== '')) {
					rows.push(currentRow);
				}
			}

			return rows;
		}

		function csvToObjects(csvText) {
			const rows = parseCsvRows(csvText);
			if (!rows.length) {
				return [];
			}

			const headers = rows[0].map(header => header.replace(/^"|"$/g, '').trim());
			const objects = [];

			for (let i = 1; i < rows.length; i++) {
				const row = rows[i];
				if (!row || !row.length) {
					continue;
				}

				const article = {};
				for (let j = 0; j < headers.length; j++) {
					article[headers[j]] = (row[j] || '').replace(/^"|"$/g, '').trim();
				}
				objects.push(article);
			}

			return objects;
		}

		function toDate(article) {
			const queryDate = article.query_date ? Date.parse(article.query_date) : NaN;
			if (!Number.isNaN(queryDate)) {
				return queryDate;
			}

			const pubDate = article.pubdate ? Date.parse(article.pubdate) : NaN;
			if (!Number.isNaN(pubDate)) {
				return pubDate;
			}

			return 0;
		}

		function escapeHtml(value) {
			return (value || '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;');
		}

		function normalizeTitle(rawTitle) {
			const title = (rawTitle || '').trim();
			return title.replace(/\.$/, '');
		}

		function formatDate(article) {
			const source = article.query_date || article.pubdate || '';
			const parsed = Date.parse(source);
			if (Number.isNaN(parsed)) {
				return source || 'Date unavailable';
			}
			return new Date(parsed).toLocaleDateString(undefined, {
				month: 'short',
				day: 'numeric'
			});
		}

		function formatAuthorsHtml(article) {
			const rochesterRaw = article.rochester_authors || '';
			const rochesterAuthors = rochesterRaw
				.split('|')
				.map(name => name.trim())
				.filter(Boolean);
			const rochesterSet = new Set(rochesterAuthors);

			let authorsList = [];
			if (article.authors_display && article.authors_display.trim()) {
				authorsList = article.authors_display.split(',').map(name => name.trim()).filter(Boolean);
			} else if (article.authors && article.authors.trim()) {
				authorsList = article.authors.split('|').map(name => name.trim()).filter(Boolean);
			}

			if (!authorsList.length) {
				return 'Authors unavailable';
			}

			let displayAuthors = [];
			if (authorsList.length <= 3) {
				displayAuthors = [...authorsList];
			} else {
				displayAuthors = authorsList.slice(0, 3);
				const remaining = authorsList.slice(3);
				const rochesterRemaining = remaining.filter(name => rochesterSet.has(name));
				displayAuthors = displayAuthors.concat(rochesterRemaining);

				const lastAuthor = authorsList[authorsList.length - 1];
				if (!displayAuthors.includes(lastAuthor)) {
					displayAuthors.push(lastAuthor);
				}
			}

			const uniqueDisplayAuthors = [];
			const seen = new Set();
			for (const name of displayAuthors) {
				if (!seen.has(name)) {
					seen.add(name);
					uniqueDisplayAuthors.push(name);
				}
			}

			return uniqueDisplayAuthors.map(name => {
				const safeName = escapeHtml(name);
				if (rochesterSet.has(name)) {
					return `<span class="roch-author">${safeName}</span>`;
				}
				return safeName;
			}).join(', ');
		}

		function buildArticleTilesHtml(articles) {
			if (!articles.length) {
				return '';
			}

			return articles.map(article => {
				const title = escapeHtml(normalizeTitle(article.title || 'Untitled article'));
				const authorsHtml = formatAuthorsHtml(article);
				const journal = escapeHtml(article.journal || 'Journal unavailable');
				const summary = escapeHtml(article.llm_summary || 'No AI summary available.');
				const dateText = escapeHtml(formatDate(article)).toUpperCase();
				const primarySpecialty = escapeHtml(article.primary_specialty || 'General Medicine');
				const secondarySpecialty = escapeHtml(article.secondary_specialty || '');
				const specialtyBadges = secondarySpecialty
					? `<div class="specialty-badges"><div class="department-badge">${primarySpecialty} &middot; ${secondarySpecialty}</div></div>`
					: `<div class="specialty-badges"><div class="department-badge">${primarySpecialty}</div></div>`;

				return `
					<article class="article-stack">
						<div class="article-tile" aria-label="Article card">
							<div class="tile-date">${dateText}</div>
							${specialtyBadges}
							<h2 class="tile-title">${title}</h2>
							<p class="tile-authors">${authorsHtml}</p>
							<p class="tile-journal">${journal}</p>
							<div class="tile-spacer"></div>
						</div>
						<div class="ai-summary-panel" aria-label="AI summary panel">
							<div class="ai-summary-label">AI Summary</div>
							<p class="ai-summary-text" data-full-summary="${summary}">${summary}</p>
						</div>
					</article>
				`;
			}).join('');
		}

		function clampSummaryTextToSpace() {
			const summaryNodes = document.querySelectorAll('.ai-summary-text');
			summaryNodes.forEach(node => {
				const fullSummary = node.getAttribute('data-full-summary') || '';
				node.textContent = fullSummary;

				if (node.clientHeight <= 0) {
					return;
				}

				if (node.scrollHeight <= node.clientHeight + 1) {
					return;
				}

				let low = 0;
				let high = fullSummary.length;
				let best = '...';

				while (low <= high) {
					const mid = Math.floor((low + high) / 2);
					const candidate = `${fullSummary.slice(0, mid).trimEnd()}...`;
					node.textContent = candidate;

					if (node.scrollHeight <= node.clientHeight + 1) {
						best = candidate;
						low = mid + 1;
					} else {
						high = mid - 1;
					}
				}

				node.textContent = best;
			});
		}

		function toArticleSets(articles, setSize, maxSets) {
			const output = [];
			for (let i = 0; i < articles.length && output.length < maxSets; i += setSize) {
				const chunk = articles.slice(i, i + setSize);
				if (chunk.length === setSize) {
					output.push(chunk);
				}
			}
			if (!output.length && articles.length) {
				output.push(articles.slice(0, Math.min(setSize, articles.length)));
			}
			return output;
		}

		function renderIndicators(count, activeIndex) {
			const indicators = document.getElementById('carouselIndicators');
			if (!indicators) return;

			if (!count || count <= 1) {
				indicators.innerHTML = '';
				return;
			}

			indicators.innerHTML = Array.from({ length: count }, (_, index) => (
				`<span class="carousel-dot${index === activeIndex ? ' active' : ''}" aria-hidden="true"></span>`
			)).join('');
		}

		function setActiveIndicator(index) {
			const indicators = document.getElementById('carouselIndicators');
			if (!indicators) return;
			const dots = indicators.querySelectorAll('.carousel-dot');
			dots.forEach((dot, dotIndex) => {
				dot.classList.toggle('active', dotIndex === index);
			});
		}

		function renderCarousel(articleSets) {
			const grid = document.getElementById('articleGrid');
			if (!grid) return;
			if (carouselTimer) {
				clearInterval(carouselTimer);
				carouselTimer = null;
			}

			if (!articleSets.length) {
				grid.innerHTML = '<div class="status-message">No articles available.</div>';
				renderIndicators(0, 0);
				return;
			}

			const baseCount = articleSets.length;
			grid.style.setProperty('--cards-per-view', String(currentCardsPerView));
			const setsForTrack = baseCount > 1 ? [...articleSets, articleSets[0]] : articleSets;
			const trackHtml = setsForTrack.map(set => (
				`<div class="carousel-slide"><div class="carousel-slide-grid">${buildArticleTilesHtml(set)}</div></div>`
			)).join('');

			grid.innerHTML = `<div class="carousel-track">${trackHtml}</div>`;
			renderIndicators(baseCount, 0);
			requestAnimationFrame(clampSummaryTextToSpace);

			if (baseCount <= 1) {
				return;
			}

			const track = grid.querySelector('.carousel-track');
			if (!track) return;

			let currentIndex = 0;
			track.style.transition = `transform ${SLIDE_DURATION_MS}ms ease`;

			const advanceSlide = () => {
				currentIndex += 1;
				track.style.transform = `translateX(-${currentIndex * 100}%)`;
				setActiveIndicator(currentIndex >= baseCount ? 0 : currentIndex);
			};

			track.addEventListener('transitionend', () => {
				clampSummaryTextToSpace();
				if (currentIndex === baseCount) {
					track.style.transition = 'none';
					currentIndex = 0;
					track.style.transform = 'translateX(0%)';
					void track.offsetWidth;
					track.style.transition = `transform ${SLIDE_DURATION_MS}ms ease`;
					clampSummaryTextToSpace();
				}
			});

			carouselTimer = setInterval(advanceSlide, ROTATE_INTERVAL_MS);
		}

		function renderResponsiveCarousel() {
			if (!allDashboardArticles.length) return;

			currentCardsPerView = getCardsPerView();
			const rotatingArticles = allDashboardArticles.slice(0, currentCardsPerView * MAX_SETS);
			const articleSets = toArticleSets(rotatingArticles, currentCardsPerView, MAX_SETS);
			renderCarousel(articleSets);
		}

		async function loadDashboardArticles() {
			const grid = document.getElementById('articleGrid');
			if (!grid) return;

			try {
				const response = await fetch('pubmed_data.csv', { cache: 'no-store' });
				if (!response.ok) {
					throw new Error('Unable to load CSV');
				}

				const csvText = await response.text();
				const allArticles = csvToObjects(csvText)
					.filter(article => article && article.pmid && article.title)
					.map((article, index) => ({ ...article, __index: index }));

				allArticles.sort((a, b) => {
					const dateDiff = toDate(b) - toDate(a);
					if (dateDiff !== 0) {
						return dateDiff;
					}
					return a.__index - b.__index;
				});

				allDashboardArticles = allArticles;
				renderResponsiveCarousel();
			} catch (error) {
				grid.innerHTML = '<div class="status-message">Could not load recent articles.</div>';
				renderIndicators(0, 0);
			}
		}

		document.addEventListener('DOMContentLoaded', () => {
			initWeatherStrip();
			loadDashboardArticles();
		});
		window.addEventListener('resize', () => {
			if (summaryResizeTimer) {
				clearTimeout(summaryResizeTimer);
			}
			summaryResizeTimer = setTimeout(clampSummaryTextToSpace, 120);

			if (layoutResizeTimer) {
				clearTimeout(layoutResizeTimer);
			}
			layoutResizeTimer = setTimeout(() => {
				const nextCardsPerView = getCardsPerView();
				if (nextCardsPerView !== currentCardsPerView) {
					renderResponsiveCarousel();
				}
			}, 160);
		});
	</script>
</body>
</html>
