<!DOCTYPE HTML>
<!--
    MedCityAI - Clinical Trials Search
-->
<html lang="en">
    <head>
        <title>Clinical Trials Search - MedCityAI</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <meta name="description" content="Search MedCityAI using an API-key-backed full-site search experience focused on clinical trials topics." />

        <link rel="icon" type="image/png" href="images/medcityai_simple1.png" />
        <link rel="apple-touch-icon" href="images/medcityai_simple1.png" />

        <link rel="stylesheet" href="assets/css/main.css" />
        <link rel="stylesheet" href="assets/css/navigation.css" />
        <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

        <style>
            :root {
                --ct-blue-1: #2568be;
                --ct-blue-2: #1b4c7d;
                --ct-accent: #3498db;
                --ct-accent-dark: #2980b9;
                --ct-ink: #1f2d3d;
                --ct-muted: #6b7280;
                --ct-bg: #f8fafc;
            }

            body {
                background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
                min-height: 100vh;
            }

            .hero-section {
                background: linear-gradient(120deg, var(--ct-blue-1) 0%, var(--ct-blue-2) 100%);
                min-height: 340px;
                display: flex;
                align-items: center;
                position: relative;
                overflow: hidden;
                z-index: 1;
            }

            .hero-bg-blobs {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
                pointer-events: none;
            }

            .hero-content {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 20px;
                display: grid;
                grid-template-columns: 1fr 300px;
                gap: 50px;
                align-items: center;
                position: relative;
                z-index: 2;
            }

            .hero-left p {
                color: #e0e0e0;
                font-size: 52px;
                font-weight: 350;
                margin: 0;
                letter-spacing: 0.2px;
                line-height: 1.25;
            }

            .search-bar-container {
                position: relative;
                max-width: 660px;
                margin-top: 24px;
            }

            .search-bar {
                width: 100%;
                padding: 12px 20px 12px 50px;
                font-size: 16px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-radius: 50px;
                background: rgba(255, 255, 255, 0.95);
                color: #2c3e50;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                transition: all 0.3s ease;
            }

            .search-bar:focus {
                outline: none;
                border-color: rgba(255, 255, 255, 0.8);
                background: #fff;
                box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
            }

            .search-icon {
                position: absolute;
                left: 20px;
                top: 50%;
                transform: translateY(-50%);
                color: #3498db;
                font-size: 18px;
                cursor: pointer;
                transition: color 0.2s ease;
            }

            .search-icon:hover {
                color: #2980b9;
            }

            .hero-right {
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .hero-logo {
                width: auto;
                height: 145px;
                border-radius: 10px;
                filter: brightness(0) invert(1);
                opacity: 0.9;
            }

            .results-section {
                width: 100%;
                margin: 0;
                padding: 46px 20px 30px;
                background: var(--ct-bg);
                min-height: 55vh;
            }

            .results-header {
                max-width: 1200px;
                margin: 0 auto 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                border-bottom: 1px solid #dbe5f0;
                padding-bottom: 12px;
            }

            .results-count {
                font-size: 1.15em;
                color: #2c3e50;
                font-weight: 600;
            }

            .results-count span {
                color: var(--ct-accent);
            }

            .results-source {
                color: #4b5d73;
                font-size: 0.92rem;
                background: #eef4fa;
                border: 1px solid #d4e0ec;
                border-radius: 999px;
                padding: 6px 12px;
            }

            .status-message {
                max-width: 1200px;
                margin: 0 auto 18px;
                color: #3c4f63;
                font-size: 0.93rem;
            }

            .status-message.error {
                color: #b42318;
            }

            .results-list {
                max-width: 1200px;
                margin: 0 auto;
            }

            .result-item {
                background: #fff;
                margin-bottom: 16px;
                padding: 24px;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                transition: all 0.2s ease;
            }

            .result-item:hover {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            }

            .result-title {
                font-size: 1.2em;
                font-weight: 600;
                color: #0056a3;
                text-decoration: none;
                line-height: 1.45;
                transition: color 0.2s ease;
            }

            .result-title:hover {
                color: #3498db;
            }

            .result-snippet {
                margin: 10px 0 14px;
                font-size: 0.96rem;
                line-height: 1.65;
                color: #41566c;
            }

            .result-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 18px;
                margin-bottom: 10px;
                font-size: 0.84rem;
                color: #697b8f;
            }

            .result-meta-item {
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }

            .result-meta-item i {
                color: #3498db;
                font-size: 0.78rem;
            }

            .result-link {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                color: #0056a3;
                text-decoration: none;
                font-size: 0.88rem;
                font-weight: 600;
            }

            .result-link:hover {
                color: #3498db;
            }

            .loading {
                text-align: center;
                padding: 60px 20px;
            }

            .spinner {
                border: 4px solid #f0f0f0;
                border-top: 4px solid #3498db;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 0 auto 16px;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            .empty-state {
                text-align: center;
                padding: 20px;
                color: #708397;
                display: none;
            }

            .empty-state i {
                font-size: 2.8rem;
                margin-bottom: 10px;
                color: #a5b6c6;
            }

            .pagination {
                max-width: 1200px;
                margin: 26px auto 0;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
            }

            .page-button {
                border: 1px solid #d2dfec;
                background: #fff;
                color: #2d4762;
                border-radius: 8px;
                padding: 9px 16px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .page-button:hover:not(:disabled) {
                border-color: var(--ct-accent);
                color: var(--ct-accent);
            }

            .page-button:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .page-indicator {
                color: #4a5f74;
                font-size: 0.92rem;
                font-weight: 600;
            }

            @media (max-width: 980px) {
                .hero-content {
                    grid-template-columns: 1fr;
                    text-align: center;
                    gap: 30px;
                    padding-top: 34px;
                    padding-bottom: 34px;
                }

                .search-bar-container {
                    margin: 20px auto 0;
                }

                .hero-left p {
                    font-size: 36px;
                }

                .hero-logo {
                    height: 88px;
                }

                .results-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            @media (max-width: 640px) {
                .hero-left p {
                    font-size: 28px;
                    line-height: 1.3;
                }

                .results-section {
                    padding: 30px 12px 24px;
                }

                .result-item {
                    padding: 16px;
                }
            }
        </style>
    </head>

    <body class="landing is-preload">
        <div id="page-wrapper">
            <div id="navigation-placeholder" data-page="clinical_trials"></div>

            <section class="hero-section" aria-label="Clinical trials search hero">
                <svg class="hero-bg-blobs" width="100%" height="900" viewBox="0 0 1440 900" aria-hidden="true" role="presentation">
                    <defs>
                        <linearGradient id="blobGradient1" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#3498db" stop-opacity="0.18" />
                            <stop offset="100%" stop-color="#b6c7e0" stop-opacity="0.12" />
                        </linearGradient>
                        <linearGradient id="blobGradient2" x1="0" y1="1" x2="1" y2="0">
                            <stop offset="0%" stop-color="#e3eaf3" stop-opacity="0.16" />
                            <stop offset="100%" stop-color="#2980b9" stop-opacity="0.10" />
                        </linearGradient>
                    </defs>
                    <g>
                        <circle cx="330" cy="220" r="330" fill="url(#blobGradient1)">
                            <animate attributeName="cx" values="330;1110;330" dur="15s" repeatCount="indefinite" />
                            <animate attributeName="cy" values="220;680;220" dur="13.125s" repeatCount="indefinite" />
                        </circle>
                        <circle cx="270" cy="180" r="270" fill="url(#blobGradient2)">
                            <animate attributeName="cx" values="270;1170;270" dur="16.875s" repeatCount="indefinite" />
                            <animate attributeName="cy" values="180;720;180" dur="11.25s" repeatCount="indefinite" />
                        </circle>
                        <circle cx="450" cy="450" r="450" fill="url(#blobGradient1)" opacity="0.7">
                            <animate attributeName="cx" values="450;990;450" dur="18.75s" repeatCount="indefinite" />
                            <animate attributeName="cy" values="450;850;450" dur="15s" repeatCount="indefinite" />
                        </circle>
                    </g>
                </svg>

                <div class="hero-content">
                    <div class="hero-left">
                        <p>search 5,000+ clinical trials from Rochester, MN</p>
                        <div class="search-bar-container">
                            <i id="search-icon" class="fas fa-search search-icon" aria-hidden="true"></i>
                            <input type="search" id="trial-search-input" class="search-bar" placeholder="Search site-wide clinical trial content" aria-label="Search clinical trials on MedCityAI" />
                        </div>
                    </div>
                    <div class="hero-right">
                        <img class="hero-logo" src="images/medcityai_simple1.png" alt="MedCityAI logo" />
                    </div>
                </div>
            </section>

            <main id="main-content" class="results-section" role="main">
                <div class="results-header">
                    <div class="results-count"><span id="resultCount">0</span> results</div>
                    <div id="sourceBadge" class="results-source">ClinicalTrials.gov API</div>
                </div>

                <div id="statusBar" class="status-message" aria-live="polite"></div>

                <section id="loadingState" class="loading" style="display:none;" aria-live="polite">
                    <div class="spinner" aria-hidden="true"></div>
                    <p>Searching MedCityAI...</p>
                </section>

                <section id="resultsList" class="results-list" aria-live="polite" aria-label="Search results list"></section>

                <section id="emptyState" class="empty-state" aria-live="polite">
                    <i class="fas fa-search"></i>
                    <h3>No results found</h3>
                    <p>Try a broader term, a synonym, or remove extra keywords.</p>
                </section>

                <nav id="pagination" class="pagination" aria-label="Results pagination" style="display:none;">
                    <button id="prevPageBtn" class="page-button" type="button">Previous</button>
                    <span id="pageIndicator" class="page-indicator">Page 1</span>
                    <button id="nextPageBtn" class="page-button" type="button">Next</button>
                </nav>
            </main>

            <footer id="footer" style="margin-top: 0;">
                <ul class="icons">
                    <li><a href="https://www.linkedin.com/company/medcityai" aria-label="Follow MedCityAI on LinkedIn" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">Follow MedCityAI on LinkedIn <i class="fab fa-linkedin-in" style="font-size: 1.3em; color: #0a66c2;"></i></a></li>
                </ul>
                <ul class="copyright">
                    <li>&copy; <span id="trial-year"></span> MedCityAI</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li><li><a href="terms_of_use.html" style="color: #999;">Terms</a> | <a href="privacy_policy.html" style="color: #999;">Privacy</a> | <a href="cookie_policy.html" style="color: #999;">Cookies</a></li>
                </ul>
            </footer>
        </div>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
        <script src="assets/js/navigation.js"></script>
        <script src="assets/js/clinical-trials.js"></script>
    </body>
</html>
