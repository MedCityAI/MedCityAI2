<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>MedCityAI Dashboard 2</title>
	<link rel="icon" type="image/png" href="images/medcityai_simple1.png?v=1" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<style>
		html, body {
			height: 100%;
			margin: 0;
		}

		body {
			font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			background: #5f7894;
			color: #1f2d3d;
			font-size: 20px;
			position: relative;
		}

		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background: linear-gradient(120deg, rgba(92, 118, 148, 0.58) 0%, rgba(73, 99, 129, 0.62) 100%),
				url('images/banner3.jpg') center center / cover no-repeat;
			opacity: 0.68;
			z-index: 0;
			pointer-events: none;
		}

		.dashboard-shell {
			height: 100vh;
			display: grid;
			grid-template-columns: 430px minmax(0, 1fr);
			gap: 0.9rem;
			padding: 0.6rem 1.1rem 0;
			box-sizing: border-box;
			font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Nfeue", Arial, sans-serif;
			position: relative;
			z-index: 1;
		}

		.dashboard-shell,
		.dashboard-shell * {
			font-family: inherit;
		}

		.left-banner {
			display: flex;
			flex-direction: column;
			align-items: stretch;
			gap: 0.8rem;
			padding: 0.65rem;
			border-radius: 18px;
			background: linear-gradient(180deg, rgba(235,246,255,0.98) 0%, rgba(224,239,255,0.97) 100%);
			border: 1px solid #9fc2e4;
			box-shadow: 0 10px 28px rgba(20, 43, 70, 0.16);
			backdrop-filter: blur(4px);
			height: 100%;
			box-sizing: border-box;
			min-height: 0;
		}

		.banner-top {
			display: grid;
			grid-template-columns: 1fr;
			gap: 0.5rem;
			align-items: start;
		}

		.dashboard-logo {
			height: clamp(52px, 7vh, 84px);
			width: auto;
			object-fit: contain;
			justify-self: start;
		}

		.weather-meta {
			font-size: 1.18rem;
			font-weight: 600;
			color: #35506a;
			white-space: nowrap;
			text-align: left;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.article-grid {
			column-width: 360px;
			column-gap: 1.2rem;
			overflow: hidden;
			padding: 0.2rem 0.05rem 0;
			box-sizing: border-box;
			min-height: 0;
			height: 100%;
			align-self: stretch;
		}

		.summary-rail {
			background: transparent;
			border: none;
			border-radius: 0;
			box-shadow: none;
			padding: 0.2rem 0.1rem 0.4rem 0.1rem;
			box-sizing: border-box;
			min-height: 0;
			height: auto;
			margin-top: 0;
			display: flex;
			flex-direction: column;
			gap: 0.45rem;
			overflow: visible;
		}

		.summary-rail-label {
			font-size: 1.02rem;
			font-weight: 600;
			letter-spacing: 0.01em;
			text-transform: none;
			color: #1f4e85;
		}

		.summary-rail-title {
			margin: 0;
			font-size: 1.7rem;
			font-weight: 500;
			line-height: 1.28;
			color: #0056a3;
			font-family: inherit;
			text-transform: none;
			letter-spacing: normal;
		}

		.summary-rail-meta {
			margin: 0;
			font-size: 0.98rem;
			line-height: 1.35;
			color: #47607b;
			font-style: italic;
		}

		.summary-rail-text {
			margin: 0;
			font-size: 1.13rem;
			line-height: 1.55;
			color: #2b4057;
			overflow: visible;
			max-height: none;
			word-break: break-word;
		}

		.summary-progress-track {
			height: 6px;
			background: rgba(92, 122, 156, 0.18);
			border-radius: 999px;
			overflow: hidden;
			align-self: end;
		}

		.summary-progress-bar {
			width: 0%;
			height: 100%;
			background: linear-gradient(90deg, #4f88be 0%, #0f5b9d 100%);
			border-radius: 999px;
		}

		.article-card {
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(247, 251, 255, 0.94) 100%);
			border: 1px solid #ccdaea;
			border-radius: 16px;
			padding: 1.15rem 0.9rem 0.8rem;
			display: grid;
			grid-template-rows: auto auto auto 1fr;
			gap: 0.45rem;
			box-shadow: 0 10px 24px rgba(19, 38, 59, 0.18);
			min-height: 0;
			overflow: hidden;
			position: relative;
			box-sizing: border-box;
			display: inline-block;
			width: 100%;
			margin: 0 0 1.2rem;
			break-inside: avoid;
			-webkit-column-break-inside: avoid;
			page-break-inside: avoid;
			transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
		}

		.article-grid.summary-focus .article-card {
			opacity: 0.64;
			filter: saturate(0.82) brightness(0.9);
		}

		.article-card.summary-active {
			border-color: #4f88be;
			opacity: 1 !important;
			filter: none !important;
			background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(247, 251, 255, 0.98) 100%);
			box-shadow: 0 0 0 3px rgba(44, 121, 189, 0.24), 0 14px 28px rgba(19, 38, 59, 0.24);
			transform: translateY(-2px);
		}

		.tile-date {
			position: absolute;
			top: 0;
			left: 0;
			background: linear-gradient(135deg, #ef6a5c 0%, #d94739 100%);
			color: #fff;
			font-size: 1.12rem;
			font-weight: 400;
			padding: 0.6rem 0.9rem;
			border-radius: 16px 0 14px 0;
			text-transform: uppercase;
			letter-spacing: 0.03em;
			line-height: 1.2;
			pointer-events: none;
		}

		.specialty-badges {
			position: absolute;
			top: 0.35rem;
			right: 0.45rem;
			display: flex;
			align-items: center;
			white-space: nowrap;
			pointer-events: none;
		}

		.department-badge {
			background: transparent;
			color: #355372;
			font-size: 0.96rem;
			font-weight: 500;
			font-style: italic;
			line-height: 1.2;
		}

		.tile-title {
			margin: 1.7rem 0 0;
			font-size: 1.7rem;
			font-weight: 500;
			line-height: 1.28;
			color: #0056a3;
			text-transform: none;
			letter-spacing: normal;
		}

		.tile-authors,
		.tile-journal {
			margin: 0;
			font-size: 1.08rem;
			line-height: 1.35;
			overflow: hidden;
			white-space: normal;
			text-overflow: clip;
		}

		.tile-authors {
			border-top: 1px dashed #c6d4e4;
			padding-top: 0.55rem;
			margin-top: 0.2rem;
			color: #2f3f52;
		}

		.tile-authors .roch-author {
			text-decoration: underline;
			text-decoration-thickness: 1px;
			text-underline-offset: 2px;
			text-decoration-color: #687b90;
		}

		.tile-journal {
			font-style: italic;
			color: #4f647d;
		}

		.status-message {
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.28rem;
			font-weight: 600;
			color: #4f647d;
			background: #fff;
			border: 1px solid #dce6f2;
			border-radius: 10px;
			padding: 2rem;
		}
	</style>
</head>
<body>
	<main class="dashboard-shell" aria-label="MedCityAI Dashboard 2">
		<aside class="left-banner" aria-live="polite" aria-label="MedCityAI side banner">
			<div class="banner-top">
				<img class="dashboard-logo" src="images/medcityai_logo1.png" alt="MedCityAI" />
				<div id="weatherMeta" class="weather-meta">--°F &middot; -- &middot; --</div>
			</div>

			<div class="summary-rail" aria-live="polite" aria-label="Random AI summary">
				<div class="summary-rail-label">AI Summary Spotlight</div>
				<h2 id="summaryRailTitle" class="summary-rail-title">Loading summary...</h2>
				<p id="summaryRailMeta" class="summary-rail-meta">Rochester research highlight</p>
				<p id="summaryRailText" class="summary-rail-text">Please wait while recent articles are loaded.</p>
				<div class="summary-progress-track" aria-hidden="true"><div id="summaryProgressBar" class="summary-progress-bar"></div></div>
			</div>
		</aside>

		<section id="articleGrid" class="article-grid" aria-label="Recent research articles grid">
			<div class="status-message">Loading recent articles...</div>
		</section>
	</main>

	<script>
		const MAX_GRID_ARTICLES = 200;
		const SUMMARY_ROTATE_MS = 12000;
		const WEATHER_REFRESH_MS = 15 * 60 * 1000;
		const ROCHESTER_TIMEZONE = 'America/Chicago';
		const WEATHER_API_URL = 'https://api.open-meteo.com/v1/forecast?latitude=44.0121&longitude=-92.4802&current=temperature_2m&temperature_unit=fahrenheit&timezone=America%2FChicago';
		let weatherTimer = null;
		let clockTimer = null;
		let latestTemperatureText = '--°F';
		let gridResizeTimer = null;
		let allDashboardArticles = [];
		let visibleSummaryArticles = [];
		let summaryRotateTimer = null;
		let currentSummaryPmid = null;

		function parseCsvRows(csvText) {
			const rows = [];
			let currentRow = [];
			let currentValue = '';
			let inQuotes = false;

			for (let i = 0; i < csvText.length; i++) {
				const char = csvText[i];
				const next = csvText[i + 1];

				if (char === '"') {
					if (inQuotes && next === '"') {
						currentValue += '"';
						i++;
					} else {
						inQuotes = !inQuotes;
					}
					continue;
				}

				if (char === ',' && !inQuotes) {
					currentRow.push(currentValue.trim());
					currentValue = '';
					continue;
				}

				if ((char === '\n' || char === '\r') && !inQuotes) {
					if (char === '\r' && next === '\n') {
						i++;
					}
					currentRow.push(currentValue.trim());
					currentValue = '';
					if (currentRow.some(cell => cell !== '')) {
						rows.push(currentRow);
					}
					currentRow = [];
					continue;
				}

				currentValue += char;
			}

			if (currentValue.length || currentRow.length) {
				currentRow.push(currentValue.trim());
				if (currentRow.some(cell => cell !== '')) {
					rows.push(currentRow);
				}
			}

			return rows;
		}

		function csvToObjects(csvText) {
			const rows = parseCsvRows(csvText);
			if (!rows.length) return [];

			const headers = rows[0].map(header => header.replace(/^"|"$/g, '').trim());
			const objects = [];

			for (let i = 1; i < rows.length; i++) {
				const row = rows[i];
				if (!row || !row.length) continue;

				const article = {};
				for (let j = 0; j < headers.length; j++) {
					article[headers[j]] = (row[j] || '').replace(/^"|"$/g, '').trim();
				}
				objects.push(article);
			}

			return objects;
		}

		function toDate(article) {
			const queryDate = article.query_date ? Date.parse(article.query_date) : NaN;
			if (!Number.isNaN(queryDate)) return queryDate;

			const pubDate = article.pubdate ? Date.parse(article.pubdate) : NaN;
			if (!Number.isNaN(pubDate)) return pubDate;

			return 0;
		}

		function escapeHtml(value) {
			return (value || '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;');
		}

		function normalizeTitle(rawTitle) {
			const title = (rawTitle || '').trim();
			return title.replace(/\.$/, '');
		}

		function formatDate(article) {
			const source = article.query_date || article.pubdate || '';
			const parsed = Date.parse(source);
			if (Number.isNaN(parsed)) {
				return source || 'Date unavailable';
			}
			return new Date(parsed).toLocaleDateString(undefined, {
				month: 'short',
				day: 'numeric'
			});
		}

		function formatAuthorsHtml(article) {
			const rochesterRaw = article.rochester_authors || '';
			const rochesterAuthors = rochesterRaw
				.split('|')
				.map(name => name.trim())
				.filter(Boolean);
			const rochesterSet = new Set(rochesterAuthors);

			let authorsList = [];
			if (article.authors_display && article.authors_display.trim()) {
				authorsList = article.authors_display.split(',').map(name => name.trim()).filter(Boolean);
			} else if (article.authors && article.authors.trim()) {
				authorsList = article.authors.split('|').map(name => name.trim()).filter(Boolean);
			}

			if (!authorsList.length) return 'Authors unavailable';

			let displayAuthors = [];
			if (authorsList.length <= 3) {
				displayAuthors = [...authorsList];
			} else {
				displayAuthors = authorsList.slice(0, 3);
				const remaining = authorsList.slice(3);
				const rochesterRemaining = remaining.filter(name => rochesterSet.has(name));
				displayAuthors = displayAuthors.concat(rochesterRemaining);
				const lastAuthor = authorsList[authorsList.length - 1];
				if (!displayAuthors.includes(lastAuthor)) {
					displayAuthors.push(lastAuthor);
				}
			}

			const uniqueDisplayAuthors = [];
			const seen = new Set();
			for (const name of displayAuthors) {
				if (!seen.has(name)) {
					seen.add(name);
					uniqueDisplayAuthors.push(name);
				}
			}

			return uniqueDisplayAuthors.map(name => {
				const safeName = escapeHtml(name);
				if (rochesterSet.has(name)) {
					return `<span class="roch-author">${safeName}</span>`;
				}
				return safeName;
			}).join(', ');
		}

		function buildArticleCardHtml(article) {
				const title = escapeHtml(normalizeTitle(article.title || 'Untitled article'));
				const authorsHtml = formatAuthorsHtml(article);
				const journal = escapeHtml(article.journal || 'Journal unavailable');
				const dateText = escapeHtml(formatDate(article)).toUpperCase();
				const primarySpecialty = escapeHtml(article.primary_specialty || 'General Medicine');
				const secondarySpecialty = escapeHtml(article.secondary_specialty || '');
				const specialtyText = secondarySpecialty ? `${primarySpecialty} &middot; ${secondarySpecialty}` : primarySpecialty;
				const pmid = escapeHtml(article.pmid || '');

				return `
					<article class="article-card" aria-label="Article card" data-pmid="${pmid}">
						<div class="tile-date">${dateText}</div>
						<div class="specialty-badges"><div class="department-badge">${specialtyText}</div></div>
						<h2 class="tile-title">${title}</h2>
						<p class="tile-authors">${authorsHtml}</p>
						<p class="tile-journal">${journal}</p>
					</article>
				`;
		}

		function shortenText(text, maxLen = 1200) {
			const normalized = (text || '').replace(/\s+/g, ' ').trim();
			if (!normalized) return 'No AI summary available for this article.';
			if (normalized.length <= maxLen) return normalized;
			return `${normalized.slice(0, maxLen).trimEnd()}...`;
		}

		function getRandomSummaryArticle() {
			if (!visibleSummaryArticles.length) return null;
			const candidates = visibleSummaryArticles.filter(article => article.pmid !== currentSummaryPmid);
			if (!candidates.length) return visibleSummaryArticles[0];
			return candidates[Math.floor(Math.random() * candidates.length)];
		}

		function setActiveSummaryCard(pmid) {
			const grid = document.getElementById('articleGrid');
			if (!grid) return;
			grid.classList.toggle('summary-focus', Boolean(pmid));

			const cards = document.querySelectorAll('.article-card');
			cards.forEach(card => {
				card.classList.toggle('summary-active', pmid && card.getAttribute('data-pmid') === String(pmid));
			});
		}

		function restartSummaryProgressBar() {
			const progressBar = document.getElementById('summaryProgressBar');
			if (!progressBar) return;

			progressBar.style.transition = 'none';
			progressBar.style.width = '0%';
			void progressBar.offsetWidth;
			progressBar.style.transition = `width ${SUMMARY_ROTATE_MS}ms linear`;
			progressBar.style.width = '100%';
		}

		function renderSummaryRail(article) {
			const titleEl = document.getElementById('summaryRailTitle');
			const metaEl = document.getElementById('summaryRailMeta');
			const textEl = document.getElementById('summaryRailText');
			if (!titleEl || !metaEl || !textEl) return;

			if (!article) {
				titleEl.textContent = 'No summary available';
				metaEl.textContent = 'Rochester research highlight';
				textEl.textContent = 'No AI summary available for this article set.';
				return;
			}

			// Match Results card title style
			const title = normalizeTitle(article.title || 'Untitled article');
			const specialty = article.secondary_specialty
				? `${article.primary_specialty || 'General Medicine'} · ${article.secondary_specialty}`
				: (article.primary_specialty || 'General Medicine');
			const dateText = formatDate(article).toUpperCase();
			const journal = article.journal || 'Journal unavailable';
			const summary = shortenText(article.llm_summary || '');

			titleEl.textContent = title;
			metaEl.textContent = `${dateText} · ${specialty} · ${journal}`;
			textEl.textContent = summary;
			textEl.style.maxHeight = 'none';
			textEl.style.overflow = 'visible';
			currentSummaryPmid = article.pmid || null;
			setActiveSummaryCard(currentSummaryPmid);
		}

		function startSummaryRotation() {
			if (summaryRotateTimer) {
				clearInterval(summaryRotateTimer);
				summaryRotateTimer = null;
			}

			const initial = getRandomSummaryArticle();
			renderSummaryRail(initial);
			restartSummaryProgressBar();

			summaryRotateTimer = setInterval(() => {
				renderSummaryRail(getRandomSummaryArticle());
				restartSummaryProgressBar();
			}, SUMMARY_ROTATE_MS);
		}

		function renderMasonryFit() {
			const grid = document.getElementById('articleGrid');
			if (!grid) return;
			if (!allDashboardArticles.length) {
				grid.innerHTML = '<div class="status-message">No articles available.</div>';
				return;
			}

			grid.innerHTML = '';
			let inserted = 0;
			visibleSummaryArticles = [];

			for (const article of allDashboardArticles) {
				grid.insertAdjacentHTML('beforeend', buildArticleCardHtml(article));
				const isOverflowing = grid.scrollHeight > grid.clientHeight + 1 || grid.scrollWidth > grid.clientWidth + 1;
				if (isOverflowing) {
					const lastCard = grid.lastElementChild;
					if (lastCard && lastCard.classList.contains('article-card')) {
						lastCard.remove();
					}
					break;
				}
				inserted += 1;
				visibleSummaryArticles.push(article);
			}

			if (inserted === 0 && allDashboardArticles.length > 0) {
				grid.insertAdjacentHTML('beforeend', buildArticleCardHtml(allDashboardArticles[0]));
				visibleSummaryArticles = [allDashboardArticles[0]];
			}

			startSummaryRotation();
		}

		function updateWeatherMeta() {
			const weatherMetaEl = document.getElementById('weatherMeta');
			if (!weatherMetaEl) return;

			const now = new Date();
			const dateText = new Intl.DateTimeFormat('en-US', {
				timeZone: ROCHESTER_TIMEZONE,
				weekday: 'short',
				month: 'short',
				day: 'numeric'
			}).format(now);

			const timeText = new Intl.DateTimeFormat('en-US', {
				timeZone: ROCHESTER_TIMEZONE,
				hour: 'numeric',
				minute: '2-digit'
			}).format(now);

			weatherMetaEl.textContent = `${latestTemperatureText} · ${dateText} · ${timeText}`;
		}

		async function refreshWeatherStrip() {
			const weatherMetaEl = document.getElementById('weatherMeta');
			if (!weatherMetaEl) return;

			try {
				const response = await fetch(WEATHER_API_URL, { cache: 'no-store' });
				if (!response.ok) {
					throw new Error('Weather unavailable');
				}

				const data = await response.json();
				const current = data && data.current ? data.current : null;
				if (!current) {
					throw new Error('Weather data missing');
				}

				latestTemperatureText = Number.isFinite(current.temperature_2m)
					? `${Math.round(current.temperature_2m)}°F`
					: '--°F';
				updateWeatherMeta();
			} catch (error) {
				latestTemperatureText = '--°F';
				updateWeatherMeta();
			}
		}

		function initWeatherStrip() {
			if (weatherTimer) clearInterval(weatherTimer);
			if (clockTimer) clearInterval(clockTimer);

			updateWeatherMeta();
			refreshWeatherStrip();

			clockTimer = setInterval(updateWeatherMeta, 1000);
			weatherTimer = setInterval(refreshWeatherStrip, WEATHER_REFRESH_MS);
		}

		async function loadDashboardGrid() {
			const grid = document.getElementById('articleGrid');
			if (!grid) return;

			try {
				const response = await fetch('pubmed_data.csv', { cache: 'no-store' });
				if (!response.ok) {
					throw new Error('Unable to load CSV');
				}

				const csvText = await response.text();
				const allArticles = csvToObjects(csvText)
					.filter(article => article && article.pmid && article.title)
					.map((article, index) => ({ ...article, __index: index }));

				allArticles.sort((a, b) => {
					const dateDiff = toDate(b) - toDate(a);
					if (dateDiff !== 0) return dateDiff;
					return a.__index - b.__index;
				});

				allDashboardArticles = allArticles.slice(0, MAX_GRID_ARTICLES);
				renderMasonryFit();
			} catch (error) {
				grid.innerHTML = '<div class="status-message">Could not load recent articles.</div>';
			}
		}

		document.addEventListener('DOMContentLoaded', () => {
			initWeatherStrip();
			loadDashboardGrid();
		});

		window.addEventListener('resize', () => {
			if (gridResizeTimer) {
				clearTimeout(gridResizeTimer);
			}
			gridResizeTimer = setTimeout(renderMasonryFit, 160);
		});
	</script>
</body>
</html>
